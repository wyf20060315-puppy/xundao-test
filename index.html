<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>寻道测试</title>
  <style>
    :root{--paper:#f6f0e4;--paper2:#fffaf0;--ink:#26302b;--muted:#6b746d;--line:rgba(53,74,63,.18);--green:#315d50;--soft:#dce8df;--gold:#b28a45;--red:#a94b40;--shadow:0 18px 45px rgba(48,62,55,.12);--r:12px}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Noto Serif SC","Source Han Serif SC","Songti SC",SimSun,serif;background:radial-gradient(circle at 18% 12%,rgba(178,138,69,.16),transparent 28%),radial-gradient(circle at 82% 20%,rgba(49,93,80,.14),transparent 30%),linear-gradient(145deg,#f4f0e8 0%,#eaf2ec 58%,#f8f3e7 100%)}button{font:inherit}.app{width:min(920px,100%);min-height:100vh;margin:0 auto;padding:28px 18px;display:flex;align-items:center;justify-content:center}.panel{width:100%;background:linear-gradient(rgba(255,250,240,.84),rgba(255,250,240,.9)),repeating-linear-gradient(90deg,rgba(49,93,80,.035) 0 1px,transparent 1px 16px);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:clamp(24px,5vw,44px);position:relative;overflow:hidden}.panel:before,.panel:after{content:"";position:absolute;left:22px;right:22px;height:1px;background:linear-gradient(90deg,transparent,rgba(49,93,80,.32),transparent)}.panel:before{top:16px}.panel:after{bottom:16px}.view{display:none;position:relative;z-index:1}.view.active{display:block}.eyebrow{margin:0 0 12px;color:var(--gold);font-family:system-ui,-apple-system,"Noto Sans SC",sans-serif;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase}h1,h2{margin:0;line-height:1.18;font-weight:700}h1{font-size:clamp(2.4rem,12vw,5.2rem);color:var(--green)}h2{font-size:clamp(1.45rem,5vw,2.3rem);color:var(--green)}p{margin:0;line-height:1.8}.subtitle{margin-top:12px;color:var(--red);font-size:clamp(1rem,3.4vw,1.25rem);font-weight:700}.intro{max-width:680px;margin-top:26px;color:#3f4b44;font-size:1.02rem}.actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:34px}.primary{min-height:48px;border-radius:var(--r);border:0;padding:0 22px;cursor:pointer;background:var(--green);color:#fffaf0;box-shadow:0 10px 22px rgba(49,93,80,.22)}.primary:active,.option:active{transform:translateY(1px)}.progress-row{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;color:var(--muted);font-family:system-ui,-apple-system,"Noto Sans SC",sans-serif;font-size:.92rem}.bar{height:8px;background:rgba(49,93,80,.12);border-radius:99px;overflow:hidden;margin-bottom:28px}.bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .22s}.question-text{margin-bottom:24px}.options{display:grid;gap:14px}.option{width:100%;border:1px solid var(--line);border-radius:var(--r);background:rgba(255,250,240,.72);padding:18px;color:var(--ink);text-align:left;cursor:pointer;display:grid;grid-template-columns:42px 1fr;gap:14px;align-items:center}.option:hover{border-color:rgba(49,93,80,.42);background:#fffaf0;box-shadow:0 8px 22px rgba(49,93,80,.1)}.option-label{width:38px;height:38px;border-radius:50%;background:var(--soft);color:var(--green);display:grid;place-items:center;font-family:system-ui,-apple-system,"Noto Sans SC",sans-serif;font-weight:700}.option-text{line-height:1.65;font-size:1rem}.result-top{display:grid;gap:10px;margin-bottom:24px}.path-title{font-size:clamp(1.8rem,8vw,3.4rem);color:var(--green);line-height:1.2;overflow-wrap:anywhere}.result-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin:24px 0}.card{border:1px solid var(--line);border-radius:var(--r);background:rgba(255,250,240,.66);padding:16px}.card.full{grid-column:1/-1}.label{color:var(--muted);font-family:system-ui,-apple-system,"Noto Sans SC",sans-serif;font-size:.84rem;margin-bottom:8px}.value{font-size:1.08rem;line-height:1.7;font-weight:700}.body-text{color:#3d4942;line-height:1.8}.quote{margin-top:18px;padding-left:14px;border-left:3px solid var(--gold);color:var(--green);font-weight:700;line-height:1.8}@media(max-width:680px){.app{padding:14px;align-items:stretch}.panel{min-height:calc(100vh - 28px);padding:28px 18px}.actions,.primary{width:100%}.option{grid-template-columns:36px 1fr;padding:15px}.option-label{width:34px;height:34px}.result-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="app"><section class="panel" aria-live="polite">
    <div id="home" class="view active"><p class="eyebrow">Xundao Test v0.1</p><h1>寻道测试</h1><p class="subtitle">测测你的修行方式、当前境界与心魔</p><div class="intro"><p>每个人都有自己的道途。</p><p>有人以行动破局，有人以复盘成长，有人靠洞察看见暗线，也有人在一次次问心中靠近自己。</p><p>这不是标准答案，只是一面小小的镜子。</p></div><div class="actions"><button class="primary" id="start" type="button">开始测试</button></div></div>
    <div id="test" class="view"><div class="progress-row"><span id="progress">第 1 / 15 题</span><span>二选一</span></div><div class="bar"><div class="bar-fill" id="bar"></div></div><h2 class="question-text" id="qtext"></h2><div class="options" id="opts"></div></div>
    <div id="result" class="view"><p class="eyebrow">你的测试结果</p><div class="result-top"><div class="path-title" id="rpath"></div><p class="body-text" id="rsummary"></p></div><div class="result-grid"><div class="card"><div class="label">当前境界</div><div class="value" id="rlevel"></div></div><div class="card"><div class="label">主心魔</div><div class="value" id="rdemon"></div></div><div class="card full"><div class="label">道心关键词</div><div class="value" id="rkeywords"></div></div><div class="card full"><div class="label">你的修行方式</div><p class="body-text" id="rpractice"></p></div><div class="card full"><div class="label">当前容易卡住的地方</div><p class="body-text" id="rstuck"></p></div><div class="card full"><div class="label">突破提醒</div><p class="body-text" id="rbreak"></p><p class="quote" id="rquote"></p></div></div><div class="actions"><button class="primary" id="restart" type="button">重新测试</button></div></div>
  </section></main>
<script>
const questions=[
{id:1,text:"你初入山门，发现一座无人探索过的秘境。你会？",options:[{label:"A",text:"先进去看看，再随机应变",sects:["剑宗","逍遥派"],level:2,demons:["冲动","逃避束缚"]},{label:"B",text:"先查资料、问前辈、画地图",sects:["丹宗","符宗"],level:2,demons:["犹豫","过度准备"]}]},
{id:2,text:"修炼遇到瓶颈时，你更可能？",options:[{label:"A",text:"换个地方、换种方式，先动起来",sects:["剑宗","逍遥派"],level:3,demons:["急于突破"]},{label:"B",text:"停下来复盘，找出卡住的原因",sects:["丹宗","问心宗"],level:3,demons:["完美主义","过度内耗"]}]},
{id:3,text:"宗门突然收到一个紧急任务，但信息很少。你会？",options:[{label:"A",text:"先带人出发，边走边判断",sects:["剑宗","器宗"],level:2,demons:["急于行动"]},{label:"B",text:"先留下来整理线索，确认风险和路线",sects:["符宗","天机阁"],level:3,demons:["过度计算"]}]},
{id:4,text:"师父给你两条路：一条快但危险，一条稳但漫长。你会？",options:[{label:"A",text:"选危险的，机会难得",sects:["剑宗","逍遥派"],level:2,demons:["冒进","执念"]},{label:"B",text:"选稳的，根基最重要",sects:["丹宗","符宗"],level:3,demons:["保守","过度规划"]}]},
{id:5,text:"你最不能忍受自己变成哪种人？",options:[{label:"A",text:"明明有能力却不敢出手",sects:["剑宗","器宗"],level:3,demons:["证明欲"]},{label:"B",text:"一直努力却不知道为何而努力",sects:["问心宗","天机阁"],level:4,demons:["意义焦虑"]}]},
{id:6,text:"面对一个复杂局势，你最先注意到？",options:[{label:"A",text:"谁在影响谁，人的动机是什么",sects:["天机阁"],level:3,demons:["想太多","过度共情"]},{label:"B",text:"规则如何运转，局面结构是什么",sects:["符宗","丹宗"],level:3,demons:["过度分析"]}]},
{id:7,text:"如果闭关十年，你更想得到？",options:[{label:"A",text:"一门足以改变命运的绝技",sects:["剑宗","器宗"],level:3,demons:["成就执念"]},{label:"B",text:"一个足以解释世界的答案",sects:["问心宗","天机阁","丹宗"],level:4,demons:["过度追问"]}]},
{id:8,text:"你更害怕失去？",options:[{label:"A",text:"自由",sects:["逍遥派"],level:3,demons:["逃避束缚"]},{label:"B",text:"方向",sects:["符宗","问心宗"],level:3,demons:["迷失焦虑"]}]},
{id:9,text:"同门都说某条路不适合你，但你心里觉得可以一试。你会？",options:[{label:"A",text:"试了再说，结果会证明",sects:["剑宗","器宗"],level:3,demons:["执念","冲动"]},{label:"B",text:"先判断他们为什么反对",sects:["天机阁","符宗"],level:4,demons:["过度权衡"]}]},
{id:10,text:"你的修炼成果迟迟不明显，你更容易？",options:[{label:"A",text:"焦躁，想立刻看到结果",sects:["器宗","剑宗"],level:2,demons:["急于求成"]},{label:"B",text:"怀疑方法，开始反复优化",sects:["丹宗","符宗"],level:3,demons:["完美主义"]}]},
{id:11,text:"你更羡慕哪种修士？",options:[{label:"A",text:"万人敬仰，战绩耀眼",sects:["剑宗","器宗"],level:3,demons:["外部认可焦虑"]},{label:"B",text:"来去自由，不受拘束",sects:["逍遥派"],level:3,demons:["逃避责任"]}]},
{id:12,text:"如果必须面对自己的心魔，你觉得它更像？",options:[{label:"A",text:"我必须证明我可以。",sects:["剑宗","器宗"],level:3,demons:["证明欲"]},{label:"B",text:"我到底想成为什么样的人？",sects:["问心宗","丹宗"],level:4,demons:["自我追问","过度内耗"]}]},
{id:13,text:"你加入宗门时，更看重？",options:[{label:"A",text:"它能给你最强的资源和功法",sects:["剑宗","器宗","符宗"],level:2,demons:["功利焦虑","成就执念"]},{label:"B",text:"它的理念是否与你契合",sects:["问心宗","逍遥派","丹宗"],level:4,demons:["价值洁癖"]}]},
{id:14,text:"你最容易被哪句话打动？",options:[{label:"A",text:"去做，答案在路上。",sects:["剑宗","逍遥派"],level:3,demons:["行动冲动"]},{label:"B",text:"看清自己，答案在心里。",sects:["问心宗","天机阁"],level:4,demons:["过度自省"]}]},
{id:15,text:"飞升前夜，你最想确认的是？",options:[{label:"A",text:"我做到过什么",sects:["剑宗","器宗","符宗"],level:4,demons:["成就执念"]},{label:"B",text:"我成为了谁",sects:["问心宗","丹宗","逍遥派"],level:5,demons:["自我整合"]}]}
];
const sectInfo={"剑宗":{icon:"⚔️",keywords:["行动","勇气","破局","信念"],strength:"果断直接，能在混乱中迅速行动，不轻易退缩。",reminder:"你有破局的勇气，但不是每一件事都需要硬闯。"},"丹宗":{icon:"🌿",keywords:["成长","优化","复盘","积累"],strength:"擅长从失败中提炼规律，长期打磨自己。",reminder:"你很会复盘和优化，但不要总等准备好了才开始。"},"符宗":{icon:"📜",keywords:["规划","结构","秩序","预判"],strength:"擅长拆解复杂问题，建立系统和路径。",reminder:"你擅长规划，但有些答案要走进去才知道。"},"天机阁":{icon:"🌙",keywords:["洞察","直觉","观察","暗线"],strength:"对细节和氛围敏感，能看见别人忽略的信息。",reminder:"你的直觉不是空想，记下来，它会变成判断。"},"器宗":{icon:"🔥",keywords:["创造","实现","作品","动手"],strength:"能把想法变成具体成果，有很强的落地能力。",reminder:"你适合把想法做出来，但别急着一次成型。"},"逍遥派":{icon:"🌊",keywords:["自由","体验","探索","真实"],strength:"重视内心舒展，能在流动中找到方向。",reminder:"你重视自由，但真正的自由也需要选择和承担。"},"问心宗":{icon:"❄️",keywords:["自省","自洽","意义","整合"],strength:"善于追问内心，重视真实与成长。",reminder:"你很会向内看，但认识自己不是反复审判自己。"}};
const levelInfo={"炼气期":{keywords:"觉察、试探、敏感、寻找方向",text:"你已经开始察觉自己和他人的不同，也隐约感觉到自己不该只是按照外界期待活着。",reminder:"先把“我好像觉得……”说清楚一点，不急着马上定型。"},"筑基期":{keywords:"原则、积累、打底、建立秩序",text:"你已经不满足于随波逐流，开始建立自己的原则、节奏和判断。",reminder:"建立一个稳定的小行动，比一次性想通所有事更重要。"},"金丹期":{keywords:"自洽、稳定、选择、内核",text:"你逐渐知道自己看重什么，也更能分辨哪些声音值得听，哪些评价不必背在身上。",reminder:"你已经有自己的判断了，下一步是学会在干扰中守住它。"},"元婴期":{keywords:"整合、复杂、接纳、关系",text:"你开始明白，人不是只能有一种样子，也不必急着删掉自己的矛盾。",reminder:"你可以同时有矛盾和方向，不必把自己整理成单一答案。"},"元婴后期":{keywords:"整合、蓄势、边界、承担",text:"你已经接近把内在方向带入现实，但仍需要一个明确的选择来完成落地。",reminder:"先把已经确认的方向放进现实里，小范围承担一次。"},"化神期":{keywords:"入世、创造、承担、影响",text:"你不再只是在寻找自己，也开始把自己带入世界。",reminder:"把你已经确认的内在方向，转化成现实里的创造和承担。"}};
const aliases={"冲动":"执念","犹豫":"过度准备","急于突破":"急于求成","急于行动":"急于求成","冒进":"执念","保守":"过度准备","过度规划":"过度计算","过度共情":"想太多","过度分析":"过度计算","成就执念":"执念","过度追问":"意义焦虑","迷失焦虑":"意义焦虑","过度权衡":"过度计算","逃避责任":"逃避束缚","自我追问":"意义焦虑","功利焦虑":"外部认可焦虑","行动冲动":"急于求成","过度自省":"过度内耗","自我整合":"意义焦虑"};
const demonReminders={"执念":"先问自己：这件事是真的重要，还是只是我不想输？","证明欲":"你不需要每一步都用来证明自己，先把该做的事做好。","完美主义":"先完成一个可用版本，比继续等待完美条件更重要。","过度准备":"准备到能开始就够了，剩下的信息会在行动中出现。","过度计算":"不必把所有风险算清楚再出发，先走一步，局势会变清。","想太多":"把脑子里的判断写下来，模糊想法才会变成可验证线索。","急于求成":"结果不会因为焦急更快出现，先把这一轮打磨完整。","逃避束缚":"分清“限制你的人”和“支撑你的责任”，不要把二者混在一起。","过度内耗":"认识自己不是反复审判自己，看到问题后就给它一个行动出口。","外部认可焦虑":"别把所有反馈都当成判决，有些只是信息，不是定义。","意义焦虑":"先做一个小选择，意义有时是在行动后慢慢长出来的。","价值洁癖":"理念重要，但现实里也需要允许不完美的开始。"};
let idx=0,answers=[];const $=id=>document.getElementById(id);const home=$("home"),test=$("test"),result=$("result"),opts=$("opts"),qtext=$("qtext"),progress=$("progress"),bar=$("bar");$("start").onclick=start;$("restart").onclick=start;
function view(v){[home,test,result].forEach(n=>n.classList.remove("active"));v.classList.add("active");scrollTo({top:0,behavior:"smooth"})}function start(){idx=0;answers=[];view(test);renderQ()}function renderQ(){const q=questions[idx];progress.textContent=`第 ${idx+1} / ${questions.length} 题`;bar.style.width=`${idx/questions.length*100}%`;qtext.textContent=q.text;opts.innerHTML="";q.options.forEach(o=>{const b=document.createElement("button");b.className="option";b.type="button";b.innerHTML=`<span class="option-label">${o.label}</span><span class="option-text">${o.text}</span>`;b.onclick=()=>select(o);opts.appendChild(b)})}function select(o){answers[idx]=o;idx++;if(idx>=questions.length){bar.style.width="100%";renderR()}else renderQ()}function count(arr){return arr.reduce((a,x)=>(a[x]=(a[x]||0)+1,a),{})}function rank(c){return Object.entries(c).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0],"zh-CN"))}function uniq(a){return [...new Set(a)]}function nd(d){return demonReminders[d]?d:(aliases[d]||d)}function levelName(avg,q15b){if(avg<=1.8)return"炼气期";if(avg<=2.6)return"筑基期";if(avg<=3.4)return"金丹期";if(avg<=4.2)return"元婴期";if(q15b||avg>=4.5)return"化神期";return"元婴后期"}
function renderR(){const sr=rank(count(answers.flatMap(a=>a.sects))),p=sr[0][0],s=sr[1]?.[0],mixed=s&&sr[0][1]-sr[1][1]<=1,sects=mixed?[p,s]:[p];const dr=rank(count(answers.flatMap(a=>a.demons).map(nd))),demon=dr[0][0];const avg=answers.reduce((n,a)=>n+a.level,0)/answers.length,lname=levelName(avg,answers[14]?.label==="B"),level=levelInfo[lname];const label=sects.map(s=>`${sectInfo[s].icon} ${s}`).join(" × "),keys=uniq(sects.flatMap(s=>sectInfo[s].keywords)),practice=sects.map(s=>`${s}：${sectInfo[s].strength}`).join(" "),srmd=sects.map(s=>sectInfo[s].reminder).join(" ");$("rpath").textContent=mixed?`混合道途：${label}`:`你的道途：${label}`;$("rsummary").textContent=`宗门测你怎么修，境界测你修到哪一步，心魔测你卡在哪里。你的平均境界分为 ${avg.toFixed(1)}。`;$("rlevel").textContent=`${lname}｜${level.keywords}`;$("rdemon").textContent=demon;$("rkeywords").textContent=keys.join("、");$("rpractice").textContent=practice;$("rstuck").textContent=demonReminders[demon]||"先把卡住你的念头说清楚，再给它一个能落地的小行动。";$("rbreak").textContent=`${level.text} ${srmd} ${level.reminder}`;$("rquote").textContent=demonReminders[demon]||level.reminder;view(result)}
</script>
</body>
</html>
